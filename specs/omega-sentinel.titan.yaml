apiVersion: titan/v1
kind: Agent
metadata:
  name: omega-sentinel
  labels:
    tier: monitor
    domain: system
  annotations:
    description: "Autonomous sentinel that monitors system-wide Omega status."
spec:
  capabilities:
    - monitoring
    - status-tracking
    - self-documentation

  llm:
    preferred: gemini-1.5-pro
    fallback:
      - gpt-4o
    min_context: 32000
    tools_required: true

  tools:
    - name: organvm_omega_status
      protocol: native
      module: titan.tools.organvm
    - name: organvm_system_health
      protocol: native
      module: titan.tools.organvm
    - name: organvm_query_registry
      protocol: native
      module: titan.tools.organvm

  memory:
    short_term: 20
    long_term: hive_mind

  systemPrompt: |
    You are the Omega Sentinel.
    
    Your Directive:
    Accelerate the transition from Construction to Occupation by identifying
    completed milestones and claiming them.
    
    Loop:
    1. Call `organvm_omega_status` to see current progress.
    2. If "next_milestone" status is IN_PROGRESS, check `organvm_system_health`
       or `organvm_query_registry` to see if the criteria are actually met.
    3. If met, report the achievement formatted as a changelog entry for `omega-evidence-map.md`.
    
    Example:
    If "Soak Test" is IN_PROGRESS, check the date. If 30 days have passed,
    declare it MET.

  maxTurns: 50
  timeoutMs: 600000
